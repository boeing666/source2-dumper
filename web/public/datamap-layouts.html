<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Datamap layouts — 20 variants</title>
<style>
  :root{
    --bg:#17181d;--panel:#1e2026;--panel2:#24262e;--border:#2c2f38;--fg:#d7dae2;--mut:#8b91a0;
    --acc:#4ec9b0;--zeb:#22242b;--hov:#2a3a37;
    --kw:#569cd6;--ty:#4ec9b0;--mb:#9cdcfe;--num:#b5cea8;--meta:#ce9178;--emb:#c586c0;--enm:#e5c07b;--fl:#dcdcaa;
    --mono:ui-monospace,'Cascadia Code',Consolas,'JetBrains Mono',monospace;
    --sans:-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @media (prefers-color-scheme: light){
    :root{--bg:#f6f7f9;--panel:#fff;--panel2:#f0f1f4;--border:#dfe2e8;--fg:#1f2328;--mut:#6e7781;
      --acc:#0e7569;--zeb:#f4f5f8;--hov:#e2efe9;--kw:#0550ae;--ty:#0e7569;--mb:#0a3069;--num:#0550ae;
      --meta:#a31515;--emb:#8250df;--enm:#b45309;--fl:#7d6520;}
  }
  :root[data-theme="dark"]{--bg:#17181d;--panel:#1e2026;--panel2:#24262e;--border:#2c2f38;--fg:#d7dae2;--mut:#8b91a0;--acc:#4ec9b0;--zeb:#22242b;--hov:#2a3a37;--kw:#569cd6;--ty:#4ec9b0;--mb:#9cdcfe;--num:#b5cea8;--meta:#ce9178;--emb:#c586c0;--enm:#e5c07b;--fl:#dcdcaa;}
  :root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--panel2:#f0f1f4;--border:#dfe2e8;--fg:#1f2328;--mut:#6e7781;--acc:#0e7569;--zeb:#f4f5f8;--hov:#e2efe9;--kw:#0550ae;--ty:#0e7569;--mb:#0a3069;--num:#0550ae;--meta:#a31515;--emb:#8250df;--enm:#b45309;--fl:#7d6520;}

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans)}
  .wrap{padding:26px clamp(14px,3vw,40px)}
  .head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{font-size:22px;font-weight:650;margin:0}
  .sub{color:var(--mut);font-size:13px;line-height:1.6;max-width:70ch;margin:6px 0 0}
  .sub code{font-family:var(--mono);color:var(--ty)}
  .tglbtn{margin-left:auto;background:var(--panel2);border:1px solid var(--border);color:var(--mut);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .tglbtn:hover{color:var(--acc);border-color:var(--acc)}
  .cards{display:flex;flex-direction:column;gap:18px;margin-top:22px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .cap{display:flex;align-items:baseline;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel2)}
  .cap .n{font-family:var(--mono);font-weight:700;color:var(--acc);font-size:13px}
  .cap .t{font-weight:650;font-size:14px}
  .cap .d{color:var(--mut);font-size:12px;margin-left:auto;text-align:right}
  .body{padding:14px 16px;font-family:var(--mono);font-size:13px;overflow-x:auto}

  /* datamap section chrome (shared) */
  .sh{color:var(--mut);font:700 10.5px/1 var(--sans);text-transform:uppercase;letter-spacing:.6px;margin:0 0 7px;display:flex;align-items:baseline;gap:7px}
  .sh b{color:var(--fg);font:700 11px/1 var(--mono)}
  .k{color:var(--mb)} .ar{color:var(--mut)} .tg{color:var(--ty)} .ty{color:var(--mut);font-size:10.5px}
  .row{}

  /* aligned table via grid subcolumns — the core fix (no overlap, columns line up) */
  .tbl{display:grid;grid-template-columns:auto 14px minmax(120px,1fr) auto;gap:2px 12px;align-items:baseline}
  .tbl .row{display:contents}
  .tbl .ty{text-align:right;white-space:nowrap}
  .tbl .k,.tbl .tg{white-space:nowrap}

  /* 01 stacked aligned tables */
  .dv01 .sec+.sec{margin-top:16px}
  /* 02 merged single table + kind column */
  .dv02 .mtbl{display:grid;grid-template-columns:auto auto 14px minmax(120px,1fr) auto;gap:2px 12px;align-items:baseline}
  .dv02 .mrow{display:contents}
  .dv02 .kd{font:700 8.5px/1 var(--sans);text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:4px;align-self:center;text-align:center}
  .kd.in{color:var(--kw);border:1px solid var(--kw)} .kd.out{color:var(--emb);border:1px solid var(--emb)} .kd.key{color:var(--enm);border:1px solid var(--enm)}
  /* 03 two-line compact, multi-column flow */
  .dv03 .flow{column-width:220px;column-gap:24px}
  .dv03 .sec{break-inside:avoid;margin-bottom:14px}
  .dv03 .e{break-inside:avoid;margin-bottom:6px;line-height:1.35}
  .dv03 .e .k{font-weight:600}
  .dv03 .e .l2{display:block;color:var(--mut);font-size:11px}
  .dv03 .e .tg{color:var(--ty)}
  /* 04 tabs */
  .dv04 .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .dv04 .tab{cursor:pointer;padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--mut);font-family:var(--sans);font-size:12.5px}
  .dv04 .tab.on{background:var(--acc);color:var(--bg);border-color:var(--acc)}
  .dv04 .pane{display:none} .dv04 .pane.on{display:block}
  /* 05 accordion */
  .dv05 .acc{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .dv05 .ah{cursor:pointer;padding:9px 12px;background:var(--panel2);display:flex;align-items:center;gap:8px;font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--fg)}
  .dv05 .ah .cnt{margin-left:auto;color:var(--mut);font:700 11px/1 var(--mono)}
  .dv05 .ah .caret{color:var(--mut);transition:transform .15s}
  .dv05 .acc.open .caret{transform:rotate(90deg)}
  .dv05 .ab{display:none;padding:10px 12px} .dv05 .acc.open .ab{display:block}
  /* 06 cards grid */
  .dv06 .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .dv06 .ec{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg)}
  .dv06 .ec .k{font-weight:600;display:block}
  .dv06 .ec .tg{display:block;color:var(--ty);font-size:12px;margin-top:2px}
  .dv06 .ec .ty{display:inline-block;margin-top:5px;padding:1px 5px;border:1px solid var(--border);border-radius:4px;font-size:9.5px}
  /* 07 pills flow */
  .dv07 .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .dv07 .pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:20px;padding:3px 10px;background:var(--bg);font-size:12px}
  .dv07 .pill .tg{color:var(--ty)} .dv07 .pill .ty{font-size:9px;color:var(--mut)}
  /* 08 definition list */
  .dv08 .dl{display:grid;grid-template-columns:auto 1fr;gap:1px 16px}
  .dv08 .dl .k{padding:2px 0} .dv08 .dl .rt{padding:2px 0;display:flex;gap:10px;justify-content:space-between}
  .dv08 .sec+.sec{margin-top:14px}
  /* 09 three fixed-height scroll panels */
  .dv09 .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
  .dv09 .sec .tbl{max-height:230px;overflow:auto;padding-right:6px}
  @media(max-width:900px){.dv09 .cols3{grid-template-columns:1fr}}
  /* 10 type-grouped */
  .dv10 .tg-sub{color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 3px}
  .dv10 .sec+.sec{margin-top:14px}
  /* 11 filter + flat */
  .dv11 .fbox{width:100%;max-width:320px;margin-bottom:12px;padding:7px 11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-family:var(--mono);font-size:12.5px}
  .dv11 .fbox:focus{outline:none;border-color:var(--acc)}
  .dv11 .kd{font:700 8px/1 var(--sans);text-transform:uppercase;padding:2px 5px;border-radius:4px;align-self:center;text-align:center}
  /* 12 two-pane */
  .dv12 .pane2{display:grid;grid-template-columns:150px 1fr;gap:18px;align-items:start}
  .dv12 .nav .ni{cursor:pointer;padding:7px 10px;border-radius:7px;display:flex;justify-content:space-between;font-family:var(--sans);font-size:12.5px;color:var(--mut)}
  .dv12 .nav .ni.on{background:var(--acc);color:var(--bg)}
  .dv12 .nav .ni .c{font-family:var(--mono);font-weight:700}
  .dv12 .paneview{display:none} .dv12 .paneview.on{display:block}
  @media(max-width:720px){.dv12 .pane2{grid-template-columns:1fr}}
  /* 13 sticky headers, single scroll */
  .dv13 .scroll{max-height:340px;overflow:auto}
  .dv13 .sh{position:sticky;top:0;background:var(--panel);padding:8px 0 6px;margin:0;z-index:1}
  .dv13 .sec+.sec .sh{border-top:1px solid var(--border)}
  /* 14 icon-led merged list */
  .dv14 .mtbl{display:grid;grid-template-columns:auto auto 14px minmax(120px,1fr) auto;gap:2px 12px;align-items:baseline}
  .dv14 .mrow{display:contents}
  .dv14 .ic{width:16px;height:16px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font:700 10px/1 var(--mono);color:var(--bg);align-self:center}
  .ic.in{background:var(--kw)} .ic.out{background:var(--emb)} .ic.key{background:var(--enm)}
  /* 15 terminal dot-leader */
  .dv15 .sec+.sec{margin-top:12px}
  .dv15 .trow{display:flex;align-items:baseline;gap:0;line-height:1.7}
  .dv15 .trow .k{white-space:nowrap} .dv15 .trow .tg{color:var(--ty);white-space:nowrap;margin-left:8px}
  .dv15 .trow .dots{flex:1;border-bottom:1px dotted var(--border);margin:0 8px;transform:translateY(-3px)}
  .dv15 .trow .ty{white-space:nowrap}
  /* 16 zebra stacked */
  .dv16 .tbl{gap:0 12px}
  .dv16 .row:nth-child(odd) .k,.dv16 .row:nth-child(odd) .ar,.dv16 .row:nth-child(odd) .tg,.dv16 .row:nth-child(odd) .ty{background:var(--zeb)}
  .dv16 .k,.dv16 .ar,.dv16 .tg,.dv16 .ty{padding:3px 0}
  .dv16 .sec+.sec{margin-top:14px}
  /* 17 grouped by target presence */
  .dv17 .grp2{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  .dv17 .gsub{color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px}
  @media(max-width:820px){.dv17 .grp2{grid-template-columns:1fr}}
  /* 18 section columns + right type rail */
  .dv18 .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
  .dv18 .rr{display:grid;grid-template-columns:1fr auto;gap:2px 10px;align-items:baseline}
  .dv18 .rr .lhs{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dv18 .rr .lhs .tg{color:var(--ty)}
  .dv18 .rr .ty{color:var(--mut);font-size:10px}
  @media(max-width:900px){.dv18 .cols3{grid-template-columns:1fr}}
  /* 19 dense key+type, target on hover */
  .dv19 .dense{column-width:180px;column-gap:22px}
  .dv19 .sec{break-inside:avoid;margin-bottom:12px}
  .dv19 .de{display:flex;justify-content:space-between;gap:10px;line-height:1.6;cursor:default}
  .dv19 .de .k{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dv19 .de .ty{color:var(--mut);font-size:10px;white-space:nowrap}
  .dv19 .de:hover .k{color:var(--acc)}
  /* 20 subgrid section columns (aligned within each column) */
  .dv20 .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
  .dv20 .sec .tbl{grid-template-columns:auto 12px 1fr}
  .dv20 .sec .tbl .ty{grid-column:1/-1;text-align:left;margin:-1px 0 3px 0;padding-left:2px}
  @media(max-width:900px){.dv20 .cols3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>Datamap layouts — 20 variants</h1>
      <p class="sub">Same real data (<code>CBaseEntity</code>): <b>30 inputs · 5 outputs · 33 keyfields</b>. Goal: show all rows,
        aligned (no overlap), compact, readable even when a section has many rows. Pick a number.</p>
    </div>
    <button class="tglbtn" id="tgl">◐ theme</button>
  </div>
  <div class="cards" id="cards"></div>
</div>

<script>
const I = (k,tg,ty)=>({k,tg,ty});
const inputs = [
  I("TeamNum","m_iInitialTeamNum()","FIELD_INT32"),I("SetTeam","","FIELD_INT32"),I("Kill","","FIELD_VOID"),
  I("KillHierarchy","","FIELD_VOID"),I("KillConstrained","","FIELD_VOID"),I("Use","","FIELD_INT32"),
  I("SetParentAttachment","","FIELD_STRING"),I("SetParentAttachmentMaintainOffset","","FIELD_STRING"),
  I("ClearParent","","FIELD_VOID"),I("FollowEntity","","FIELD_STRING"),I("SetDamageFilter","","FIELD_STRING"),
  I("EnableDamageForces","","FIELD_VOID"),I("DisableDamageForces","","FIELD_VOID"),I("DispatchResponse","","FIELD_STRING"),
  I("AddContext","","FIELD_STRING"),I("RemoveContext","","FIELD_STRING"),I("ClearContext","","FIELD_VOID"),
  I("AddAttribute","","FIELD_STRING"),I("RemoveAttribute","","FIELD_STRING"),I("DisableShadow","","FIELD_VOID"),
  I("EnableShadow","","FIELD_VOID"),I("FireUser1","","FIELD_STRING"),I("FireUser2","","FIELD_STRING"),
  I("FireUser3","","FIELD_STRING"),I("FireUser4","","FIELD_STRING"),I("ChangeSubclass","","FIELD_STRING"),
  I("EnablePlatform","InputPlatformEnable()","FIELD_VOID"),I("DisablePlatform","InputPlatformDisable()","FIELD_VOID"),
  I("PlatformFollowYaw","","FIELD_VOID"),I("PlatformIgnoreYaw","","FIELD_VOID"),
];
const outputs = [
  I("OnUser1","m_OnUser1","FIELD_CUSTOM"),I("OnUser2","m_OnUser2","FIELD_CUSTOM"),I("OnUser3","m_OnUser3","FIELD_CUSTOM"),
  I("OnUser4","m_OnUser4","FIELD_CUSTOM"),I("OnKilled","m_OnKilled","FIELD_CUSTOM"),
];
const keyfields = [
  I("globalname","m_iGlobalname","FIELD_STRING"),I("vscripts","m_iszPrivateVScripts","FIELD_STRING"),
  I("nextthink","m_nNextThinkTick","FIELD_TICK"),I("effects","m_fEffects","FIELD_UINT32"),
  I("ResponseContext","m_iszResponseContext","FIELD_STRING"),I("subclass_id","m_nSubclassID","FIELD_UTLSTRINGTOKEN"),
  I("subclass_name","","FIELD_STRING"),I("max_health","m_iMaxHealth","FIELD_INT32"),I("target","m_target","FIELD_STRING"),
  I("platform_type","m_nPlatformType","FIELD_UINT8"),I("damagefilter","m_iszDamageFilterName","FIELD_STRING"),
  I("MoveType","m_MoveType","FIELD_UINT8"),I("owner","m_hOwnerEntity","FIELD_EHANDLE"),I("caster","","FIELD_EHANDLE"),
  I("teamnumber","m_iTeamNum","FIELD_UINT8"),I("basevelocity","m_vecBaseVelocity","FIELD_VECTOR"),
  I("avelocity","m_vecAngVelocity","FIELD_VECTOR"),I("gravity","m_flGravityScale","FIELD_FLOAT32"),
  I("friction","m_flFriction","FIELD_FLOAT32"),I("ltime","m_flLocalTime","FIELD_FLOAT32"),
  I("velocity","m_vecVelocity","FIELD_VECTOR"),I("spawnflags","m_spawnflags","FIELD_UINT32"),
  I("disablelowviolence","m_bDisableLowViolence","FIELD_BOOLEAN"),I("LagCompensate","m_bLagCompensate","FIELD_BOOLEAN"),
  I("health","m_iHealth","FIELD_INT32"),I("angles","","FIELD_QANGLE"),I("origin","","FIELD_VECTOR"),
  I("model","","FIELD_STRING"),I("ownername","","FIELD_STRING"),I("disableshadows","","FIELD_BOOLEAN"),
  I("disablereceiveshadows","","FIELD_BOOLEAN"),I("nodamageforces","","FIELD_BOOLEAN"),I("angle","","FIELD_QANGLE"),
];
const SECTIONS = [["inputs",inputs],["outputs",outputs],["keyfields",keyfields]];
const ALL = [...inputs.map(e=>({...e,kd:"in"})),...outputs.map(e=>({...e,kd:"out"})),...keyfields.map(e=>({...e,kd:"key"}))];
const esc = s => s.replace(/</g,"&lt;");

// shared renderers ----------------------------------------------------------
const rowStd = e => `<div class="row"><span class="k">${e.k}</span><span class="ar">${e.tg?"→":""}</span><span class="tg">${esc(e.tg)}</span><span class="ty">${e.ty}</span></div>`;
const secTbl = ([t,list]) => `<section class="sec"><div class="sh">${t} <b>${list.length}</b></div><div class="tbl">${list.map(rowStd).join("")}</div></section>`;
const stdBody = () => `<div class="dm">${SECTIONS.map(secTbl).join("")}</div>`;

// variant builders ----------------------------------------------------------
const V = [
["stacked aligned tables","grid subcolumns · full width · sections stacked", stdBody],
["merged table + kind column","all entries, one aligned table, IN/OUT/KEY tag", ()=>{
  return `<div class="mtbl">`+ALL.map(e=>`<div class="mrow"><span class="kd ${e.kd}">${e.kd}</span><span class="k">${e.k}</span><span class="ar">${e.tg?"→":""}</span><span class="tg">${esc(e.tg)}</span><span class="ty">${e.ty}</span></div>`).join("")+`</div>`;
}],
["two-line compact, multi-column","key on top, →target·type below; flows into columns", ()=>{
  return `<div class="flow">`+SECTIONS.map(([t,l])=>`<section class="sec"><div class="sh">${t} <b>${l.length}</b></div>`+l.map(e=>`<div class="e"><span class="k">${e.k}</span><span class="l2">${e.tg?"→ <span class='tg'>"+esc(e.tg)+"</span> · ":""}${e.ty}</span></div>`).join("")+`</section>`).join("")+`</div>`;
}],
["tabs","one section at a time, full-width aligned table", ()=>{
  const tabs = SECTIONS.map(([t,l],i)=>`<div class="tab${i===0?" on":""}" data-p="${i}">${t} ${l.length}</div>`).join("");
  const panes = SECTIONS.map(([t,l],i)=>`<div class="pane${i===0?" on":""}"><div class="tbl">${l.map(rowStd).join("")}</div></div>`).join("");
  return `<div class="tabwrap"><div class="tabs">${tabs}</div>${panes}</div>`;
},(el)=>{el.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{el.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));el.querySelectorAll(".pane").forEach(x=>x.classList.remove("on"));t.classList.add("on");el.querySelectorAll(".pane")[+t.dataset.p].classList.add("on");})}],
["accordion","collapsible sections; open what you need", ()=>{
  return SECTIONS.map(([t,l],i)=>`<div class="acc${i!==1?" open":""}"><div class="ah"><span class="caret">▸</span>${t}<span class="cnt">${l.length}</span></div><div class="ab"><div class="tbl">${l.map(rowStd).join("")}</div></div></div>`).join("");
},(el)=>{el.querySelectorAll(".ah").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));}],
["cards grid","each entry a mini card, auto-fill", ()=>{
  return SECTIONS.map(([t,l])=>`<section class="sec" style="margin-bottom:14px"><div class="sh">${t} <b>${l.length}</b></div><div class="cardgrid">`+l.map(e=>`<div class="ec"><span class="k">${e.k}</span>${e.tg?`<span class="tg">→ ${esc(e.tg)}</span>`:""}<span class="ty">${e.ty}</span></div>`).join("")+`</div></section>`).join("");
}],
["pills flow","dense key→target pills per section band", ()=>{
  return SECTIONS.map(([t,l])=>`<div class="sh">${t} <b>${l.length}</b></div><div class="pills">`+l.map(e=>`<span class="pill"><span class="k">${e.k}</span>${e.tg?`→ <span class="tg">${esc(e.tg)}</span>`:""}<span class="ty">${e.ty.replace("FIELD_","")}</span></span>`).join("")+`</div>`).join("");
}],
["definition list","key column left, target+type right, zebra", ()=>{
  return SECTIONS.map(([t,l])=>`<section class="sec"><div class="sh">${t} <b>${l.length}</b></div><div class="dl">`+l.map(e=>`<span class="k">${e.k}</span><span class="rt"><span class="tg">${e.tg?esc(e.tg):"—"}</span><span class="ty">${e.ty}</span></span>`).join("")+`</div></section>`).join("");
}],
["three scroll panels","sections side-by-side, each scrolls (bounded height)", ()=>{
  return `<div class="cols3">${SECTIONS.map(secTbl).join("")}</div>`;
}],
["type-grouped","within each section, grouped by FIELD_* type", ()=>{
  return SECTIONS.map(([t,l])=>{
    const by={};l.forEach(e=>{(by[e.ty]=by[e.ty]||[]).push(e);});
    const groups=Object.keys(by).sort().map(ty=>`<div class="tg-sub">${ty} · ${by[ty].length}</div><div class="tbl">`+by[ty].map(e=>`<div class="row"><span class="k">${e.k}</span><span class="ar">${e.tg?"→":""}</span><span class="tg">${esc(e.tg)}</span><span class="ty"></span></div>`).join("")+`</div>`).join("");
    return `<section class="sec"><div class="sh">${t} <b>${l.length}</b></div>${groups}</section>`;
  }).join("");
}],
["filter + flat list","type to filter across all entries", ()=>{
  const rows=ALL.map(e=>`<div class="mrow row" data-s="${(e.k+' '+e.tg+' '+e.ty).toLowerCase()}"><span class="kd ${e.kd}" style="border:1px solid;padding:2px 5px;border-radius:4px;color:var(--${e.kd==='in'?'kw':e.kd==='out'?'emb':'enm'})">${e.kd}</span><span class="k">${e.k}</span><span class="ar">${e.tg?"→":""}</span><span class="tg">${esc(e.tg)}</span><span class="ty">${e.ty}</span></div>`).join("");
  return `<input class="fbox" placeholder="filter ${ALL.length} entries…"><div class="mtbl" style="display:grid;grid-template-columns:auto auto 14px minmax(120px,1fr) auto;gap:2px 12px;align-items:baseline">${rows}</div>`;
},(el)=>{const f=el.querySelector(".fbox");f.oninput=()=>{const q=f.value.toLowerCase();el.querySelectorAll(".mrow").forEach(r=>{r.style.display=r.dataset.s.includes(q)?"contents":"none";});};}],
["two-pane","section list + detail table", ()=>{
  const nav=SECTIONS.map(([t,l],i)=>`<div class="ni${i===0?" on":""}" data-p="${i}">${t}<span class="c">${l.length}</span></div>`).join("");
  const views=SECTIONS.map(([t,l],i)=>`<div class="paneview${i===0?" on":""}"><div class="tbl">${l.map(rowStd).join("")}</div></div>`).join("");
  return `<div class="pane2"><div class="nav">${nav}</div><div class="views">${views}</div></div>`;
},(el)=>{el.querySelectorAll(".ni").forEach(n=>n.onclick=()=>{el.querySelectorAll(".ni").forEach(x=>x.classList.remove("on"));el.querySelectorAll(".paneview").forEach(x=>x.classList.remove("on"));n.classList.add("on");el.querySelectorAll(".paneview")[+n.dataset.p].classList.add("on");});}],
["sticky headers, single scroll","one column, section headers stick while scrolling", ()=>{
  return `<div class="scroll">${SECTIONS.map(secTbl).join("")}</div>`;
}],
["icon-led merged list","IN/OUT/KEY icon per row, one aligned table", ()=>{
  return `<div class="mtbl">`+ALL.map(e=>`<div class="mrow"><span class="ic ${e.kd}">${e.kd[0].toUpperCase()}</span><span class="k">${e.k}</span><span class="ar">${e.tg?"→":""}</span><span class="tg">${esc(e.tg)}</span><span class="ty">${e.ty}</span></div>`).join("")+`</div>`;
}],
["terminal dot-leader","key ···· TYPE, target inline", ()=>{
  return SECTIONS.map(([t,l])=>`<section class="sec"><div class="sh">${t} <b>${l.length}</b></div>`+l.map(e=>`<div class="trow"><span class="k">${e.k}</span>${e.tg?`<span class="tg">→ ${esc(e.tg)}</span>`:""}<span class="dots"></span><span class="ty">${e.ty}</span></div>`).join("")+`</section>`).join("");
}],
["zebra stacked tables","striped rows, compact", stdBody],
["split: mapped vs actions","keyfields with a member vs handler-only, two columns", ()=>{
  const render=(t,l)=>{const mapped=l.filter(e=>e.tg),bare=l.filter(e=>!e.tg);
    return `<div class="sh">${t} <b>${l.length}</b></div><div class="grp2"><div><div class="gsub">mapped → member (${mapped.length})</div><div class="tbl">${mapped.map(rowStd).join("")}</div></div><div><div class="gsub">no member (${bare.length})</div><div class="tbl">${bare.map(rowStd).join("")}</div></div></div>`;};
  return SECTIONS.map(([t,l])=>`<section class="sec" style="margin-bottom:14px">${render(t,l)}</section>`).join("");
}],
["section columns + type rail","3 columns, type right-aligned per row", ()=>{
  return `<div class="cols3">${SECTIONS.map(([t,l])=>`<section class="sec"><div class="sh">${t} <b>${l.length}</b></div><div class="rr">`+l.map(e=>`<span class="lhs"><span class="k">${e.k}</span>${e.tg?` → <span class="tg">${esc(e.tg)}</span>`:""}</span><span class="ty">${e.ty.replace("FIELD_","")}</span>`).join("")+`</div></section>`).join("")}</div>`;
}],
["ultra-dense, type on right","key + type only, hover for target (title)", ()=>{
  return `<div class="dense">${SECTIONS.map(([t,l])=>`<section class="sec"><div class="sh">${t} <b>${l.length}</b></div>`+l.map(e=>`<div class="de" title="${e.tg?"→ "+esc(e.tg):"(no member)"}"><span class="k">${e.k}</span><span class="ty">${e.ty.replace("FIELD_","")}</span></div>`).join("")+`</section>`).join("")}</div>`;
}],
["section columns, type under","3 columns; key→target, type on its own line", ()=>{
  return `<div class="cols3">${SECTIONS.map(secTbl).join("")}</div>`;
}],
];

const cards=document.getElementById("cards");
V.forEach((v,i)=>{
  const id=String(i+1).padStart(2,"0");
  const card=document.createElement("div");
  card.className="card dv"+id;
  card.innerHTML=`<div class="cap"><span class="n">${id}</span><span class="t">${v[0]}</span><span class="d">${v[1]}</span></div><div class="body">${v[2]()}</div>`;
  cards.appendChild(card);
  if(v[3]) v[3](card);
});

const root=document.documentElement;
document.getElementById("tgl").onclick=()=>{const cur=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");root.setAttribute("data-theme",cur==="dark"?"light":"dark");};
</script>
</body>
</html>
