<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Datamap — dense / space-filling</title>
<style>
  :root{--bg:#17181d;--panel:#1e2026;--panel2:#24262e;--border:#2c2f38;--fg:#d7dae2;--mut:#8b91a0;--acc:#4ec9b0;--zeb:#22242b;
    --kw:#569cd6;--ty:#4ec9b0;--mb:#9cdcfe;--num:#b5cea8;--meta:#ce9178;--emb:#c586c0;--enm:#e5c07b;--fl:#dcdcaa;
    --mono:ui-monospace,'Cascadia Code',Consolas,'JetBrains Mono',monospace;--sans:-apple-system,'Segoe UI',Roboto,sans-serif;}
  @media (prefers-color-scheme: light){:root{--bg:#f6f7f9;--panel:#fff;--panel2:#f0f1f4;--border:#dfe2e8;--fg:#1f2328;--mut:#6e7781;--acc:#0e7569;--zeb:#f4f5f8;--kw:#0550ae;--ty:#0e7569;--mb:#0a3069;--num:#0550ae;--meta:#a31515;--emb:#8250df;--enm:#b45309;--fl:#7d6520;}}
  :root[data-theme="dark"]{--bg:#17181d;--panel:#1e2026;--panel2:#24262e;--border:#2c2f38;--fg:#d7dae2;--mut:#8b91a0;--acc:#4ec9b0;--zeb:#22242b;--kw:#569cd6;--ty:#4ec9b0;--mb:#9cdcfe;--num:#b5cea8;--meta:#ce9178;--emb:#c586c0;--enm:#e5c07b;--fl:#dcdcaa;}
  :root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--panel2:#f0f1f4;--border:#dfe2e8;--fg:#1f2328;--mut:#6e7781;--acc:#0e7569;--zeb:#f4f5f8;--kw:#0550ae;--ty:#0e7569;--mb:#0a3069;--num:#0550ae;--meta:#a31515;--emb:#8250df;--enm:#b45309;--fl:#7d6520;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--sans)}
  .wrap{padding:26px clamp(14px,3vw,40px)}
  .head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{font-size:22px;font-weight:650;margin:0}
  .sub{color:var(--mut);font-size:13px;line-height:1.6;max-width:74ch;margin:6px 0 0}
  .sub code{font-family:var(--mono);color:var(--ty)} .sub b{color:var(--fg)}
  .tglbtn{margin-left:auto;background:var(--panel2);border:1px solid var(--border);color:var(--mut);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .tglbtn:hover{color:var(--acc);border-color:var(--acc)}
  .cards{display:flex;flex-direction:column;gap:18px;margin-top:22px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .cap{display:flex;align-items:baseline;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel2)}
  .cap .n{font-family:var(--mono);font-weight:700;color:var(--acc);font-size:13px}
  .cap .t{font-weight:650;font-size:14px} .cap .d{color:var(--mut);font-size:12px;margin-left:auto;text-align:right}
  .body{padding:12px 16px;font-family:var(--mono);font-size:12.5px}

  .sh{color:var(--mut);font:700 10px/1 var(--sans);text-transform:uppercase;letter-spacing:.6px;margin:0 0 8px;display:flex;align-items:baseline;gap:7px}
  .sh:not(:first-child){margin-top:14px}
  .sh b{color:var(--fg);font:700 11px/1 var(--mono)}
  .k{color:var(--mb)} .tg{color:var(--ty)} .ty{color:var(--mut)}
  .kd-in{--kc:var(--kw)} .kd-out{--kc:var(--emb)} .kd-key{--kc:var(--enm)}

  /* 01 auto-fit cells, 2-line */
  .g{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:6px}
  .cell{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 9px;min-width:0}
  .cell .k{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cell .sub2{display:block;color:var(--mut);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .cell .sub2 .tg{color:var(--ty)}
  /* 02 auto-fit 1-line key · TYPE */
  .g1{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:4px 8px}
  .c1{display:flex;justify-content:space-between;gap:8px;padding:2px 8px;background:var(--zeb);border-radius:5px;min-width:0}
  .c1 .k{white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .c1 .ty{font-size:10px;white-space:nowrap}
  /* 03 ultra compact key + tiny type */
  .g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:2px 8px}
  .c3{display:flex;justify-content:space-between;gap:6px;min-width:0;line-height:1.55}
  .c3 .k{white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .c3 .ty{font-size:9.5px;color:var(--mut);white-space:nowrap}
  /* 04 / 05 chip cloud */
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);border-left:2px solid var(--kc,var(--border));border-radius:5px;padding:2px 8px;background:var(--bg);white-space:nowrap}
  .chip .tg{color:var(--ty)} .chip .ty{color:var(--mut);font-size:9px}
  /* 06 merged auto-fit with kind dot */
  .cell .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--kc);margin-right:6px;vertical-align:1px}
  /* 07 multicol single line */
  .mc{column-width:250px;column-gap:24px}
  .mc .sec{break-inside:avoid;margin-bottom:12px}
  .ml{display:flex;justify-content:space-between;gap:10px;line-height:1.65}
  .ml .lhs{white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .ml .lhs .tg{color:var(--ty)}
  .ml .ty{color:var(--mut);font-size:10px;white-space:nowrap}
  /* 08 comma run */
  .run{line-height:1.9;word-spacing:1px} .run .e{white-space:nowrap} .run .tg{color:var(--ty)} .run .sep{color:var(--mut)}
  /* 09 member-emphasized cells */
  .g9{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:6px}
  .c9{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 9px;min-width:0}
  .c9 .tg{display:block;color:var(--ty);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c9 .b2{display:flex;justify-content:space-between;gap:8px;color:var(--mut);font-size:10px;margin-top:2px}
  .c9 .b2 .k{color:var(--mb)}
  /* 10 type-grouped chip rows */
  .tgrp{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;align-items:start}
  .tgrp .tl{color:var(--mut);font-size:10px;text-align:right;padding-top:4px;white-space:nowrap}
  /* 11 merged sorted auto-fit (same as 01 grid) */
  /* 12 left kind stripe cells */
  .g12{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px}
  .c12{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--kc);border-radius:6px;padding:5px 9px;min-width:0}
  .c12 .k{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .c12 .s2{color:var(--mut);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:1px}
  .c12 .s2 .tg{color:var(--ty)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>Datamap — dense / space-filling</h1>
      <p class="sub">Same data (<code>CBaseEntity</code>): <b>30 inputs · 5 outputs · 33 keyfields</b>. Every layout uses
        <code>auto-fit</code> / wrap so cells stretch to fill the full width — no empty columns, no dead vertical gaps. Pick a number.</p>
    </div>
    <button class="tglbtn" id="tgl">◐ theme</button>
  </div>
  <div class="cards" id="cards"></div>
</div>
<script>
const I=(k,tg,ty)=>({k,tg,ty});
const inputs=[I("TeamNum","m_iInitialTeamNum()","FIELD_INT32"),I("SetTeam","","FIELD_INT32"),I("Kill","","FIELD_VOID"),I("KillHierarchy","","FIELD_VOID"),I("KillConstrained","","FIELD_VOID"),I("Use","","FIELD_INT32"),I("SetParentAttachment","","FIELD_STRING"),I("SetParentAttachmentMaintainOffset","","FIELD_STRING"),I("ClearParent","","FIELD_VOID"),I("FollowEntity","","FIELD_STRING"),I("SetDamageFilter","","FIELD_STRING"),I("EnableDamageForces","","FIELD_VOID"),I("DisableDamageForces","","FIELD_VOID"),I("DispatchResponse","","FIELD_STRING"),I("AddContext","","FIELD_STRING"),I("RemoveContext","","FIELD_STRING"),I("ClearContext","","FIELD_VOID"),I("AddAttribute","","FIELD_STRING"),I("RemoveAttribute","","FIELD_STRING"),I("DisableShadow","","FIELD_VOID"),I("EnableShadow","","FIELD_VOID"),I("FireUser1","","FIELD_STRING"),I("FireUser2","","FIELD_STRING"),I("FireUser3","","FIELD_STRING"),I("FireUser4","","FIELD_STRING"),I("ChangeSubclass","","FIELD_STRING"),I("EnablePlatform","InputPlatformEnable()","FIELD_VOID"),I("DisablePlatform","InputPlatformDisable()","FIELD_VOID"),I("PlatformFollowYaw","","FIELD_VOID"),I("PlatformIgnoreYaw","","FIELD_VOID")];
const outputs=[I("OnUser1","m_OnUser1","FIELD_CUSTOM"),I("OnUser2","m_OnUser2","FIELD_CUSTOM"),I("OnUser3","m_OnUser3","FIELD_CUSTOM"),I("OnUser4","m_OnUser4","FIELD_CUSTOM"),I("OnKilled","m_OnKilled","FIELD_CUSTOM")];
const keyfields=[I("globalname","m_iGlobalname","FIELD_STRING"),I("vscripts","m_iszPrivateVScripts","FIELD_STRING"),I("nextthink","m_nNextThinkTick","FIELD_TICK"),I("effects","m_fEffects","FIELD_UINT32"),I("ResponseContext","m_iszResponseContext","FIELD_STRING"),I("subclass_id","m_nSubclassID","FIELD_UTLSTRINGTOKEN"),I("subclass_name","","FIELD_STRING"),I("max_health","m_iMaxHealth","FIELD_INT32"),I("target","m_target","FIELD_STRING"),I("platform_type","m_nPlatformType","FIELD_UINT8"),I("damagefilter","m_iszDamageFilterName","FIELD_STRING"),I("MoveType","m_MoveType","FIELD_UINT8"),I("owner","m_hOwnerEntity","FIELD_EHANDLE"),I("caster","","FIELD_EHANDLE"),I("teamnumber","m_iTeamNum","FIELD_UINT8"),I("basevelocity","m_vecBaseVelocity","FIELD_VECTOR"),I("avelocity","m_vecAngVelocity","FIELD_VECTOR"),I("gravity","m_flGravityScale","FIELD_FLOAT32"),I("friction","m_flFriction","FIELD_FLOAT32"),I("ltime","m_flLocalTime","FIELD_FLOAT32"),I("velocity","m_vecVelocity","FIELD_VECTOR"),I("spawnflags","m_spawnflags","FIELD_UINT32"),I("disablelowviolence","m_bDisableLowViolence","FIELD_BOOLEAN"),I("LagCompensate","m_bLagCompensate","FIELD_BOOLEAN"),I("health","m_iHealth","FIELD_INT32"),I("angles","","FIELD_QANGLE"),I("origin","","FIELD_VECTOR"),I("model","","FIELD_STRING"),I("ownername","","FIELD_STRING"),I("disableshadows","","FIELD_BOOLEAN"),I("disablereceiveshadows","","FIELD_BOOLEAN"),I("nodamageforces","","FIELD_BOOLEAN"),I("angle","","FIELD_QANGLE")];
const SEC=[["inputs",inputs,"in"],["outputs",outputs,"out"],["keyfields",keyfields,"key"]];
const ALL=[...inputs.map(e=>({...e,kd:"in"})),...outputs.map(e=>({...e,kd:"out"})),...keyfields.map(e=>({...e,kd:"key"}))];
const esc=s=>s.replace(/</g,"&lt;");
const shrt=t=>t.replace("FIELD_","");
const head=(t,l)=>`<div class="sh">${t} <b>${l.length}</b></div>`;

const V=[
["auto-fit cells (2-line)","key on top · →member + type below · stretches to fill width",()=>
  SEC.map(([t,l])=>head(t,l)+`<div class="g">`+l.map(e=>`<div class="cell"><span class="k">${e.k}</span><span class="sub2">${e.tg?`→ <span class='tg'>${esc(e.tg)}</span> · `:""}${e.ty}</span></div>`).join("")+`</div>`).join("")],
["auto-fit 1-line (key · type)","single line, key left / type right, zebra cells",()=>
  SEC.map(([t,l])=>head(t,l)+`<div class="g1">`+l.map(e=>`<div class="c1"><span class="k">${e.k}</span><span class="ty">${shrt(e.ty)}</span></div>`).join("")+`</div>`).join("")],
["ultra-compact grid","narrowest cells, key + tiny type, max per row",()=>
  SEC.map(([t,l])=>head(t,l)+`<div class="g3">`+l.map(e=>`<div class="c3" title="${e.tg?"→ "+esc(e.tg):""}"><span class="k">${e.k}</span><span class="ty">${shrt(e.ty)}</span></div>`).join("")+`</div>`).join("")],
["chip cloud","key chips, kind stripe, type on hover — tightest packing",()=>
  SEC.map(([t,l,kd])=>head(t,l)+`<div class="chips">`+l.map(e=>`<span class="chip kd-${kd}" title="${e.ty}${e.tg?" → "+esc(e.tg):""}">${e.k}</span>`).join("")+`</div>`).join("")],
["chip cloud + member","key→member chips where mapped, bare key otherwise",()=>
  SEC.map(([t,l,kd])=>head(t,l)+`<div class="chips">`+l.map(e=>`<span class="chip kd-${kd}">${e.k}${e.tg?` → <span class="tg">${esc(e.tg)}</span>`:""}<span class="ty">${shrt(e.ty)}</span></span>`).join("")+`</div>`).join("")],
["merged auto-fit","all 68 in one grid, kind dot — no per-section columns",()=>
  `<div class="g">`+ALL.map(e=>`<div class="cell kd-${e.kd}"><span class="k"><span class="dot"></span>${e.k}</span><span class="sub2">${e.tg?`→ <span class='tg'>${esc(e.tg)}</span> · `:""}${e.ty}</span></div>`).join("")+`</div>`],
["multi-column lines","key→member  type, flows into balanced columns",()=>
  `<div class="mc">`+SEC.map(([t,l])=>`<div class="sec">`+head(t,l)+l.map(e=>`<div class="ml"><span class="lhs">${e.k}${e.tg?` → <span class="tg">${esc(e.tg)}</span>`:""}</span><span class="ty">${shrt(e.ty)}</span></div>`).join("")+`</div>`).join("")+`</div>`],
["comma run","densest — entries as a wrapping run per section",()=>
  SEC.map(([t,l])=>head(t,l)+`<div class="run">`+l.map((e,i)=>`<span class="e"><span class="k">${e.k}</span>${e.tg?`→<span class="tg">${esc(e.tg)}</span>`:""}</span>${i<l.length-1?'<span class="sep">, </span>':""}`).join("")+`</div>`).join("")],
["member-first cells","member (schema field) emphasized, key+type below",()=>
  SEC.map(([t,l])=>head(t,l)+`<div class="g9">`+l.map(e=>`<div class="c9"><span class="tg">${e.tg?esc(e.tg):"—"}</span><span class="b2"><span class="k">${e.k}</span><span>${shrt(e.ty)}</span></span></div>`).join("")+`</div>`).join("")],
["grouped by type","each FIELD_* type → a row of key chips filling width",()=>{
  return SEC.map(([t,l,kd])=>{const by={};l.forEach(e=>{(by[e.ty]=by[e.ty]||[]).push(e);});
    return head(t,l)+`<div class="tgrp">`+Object.keys(by).sort().map(ty=>`<span class="tl">${shrt(ty)}</span><div class="chips">`+by[ty].map(e=>`<span class="chip kd-${kd}">${e.k}</span>`).join("")+`</div>`).join("")+`</div>`;}).join("");}],
["merged A→Z cells","all entries sorted by name, auto-fit — fast scan",()=>
  `<div class="g">`+[...ALL].sort((a,b)=>a.k.localeCompare(b.k)).map(e=>`<div class="cell kd-${e.kd}"><span class="k"><span class="dot"></span>${e.k}</span><span class="sub2">${e.tg?`→ <span class='tg'>${esc(e.tg)}</span> · `:""}${shrt(e.ty)}</span></div>`).join("")+`</div>`],
["kind-stripe cells","2-line cells with colored left edge per kind",()=>
  SEC.map(([t,l,kd])=>head(t,l)+`<div class="g12">`+l.map(e=>`<div class="c12 kd-${kd}"><span class="k">${e.k}</span><span class="s2">${e.tg?`→ <span class='tg'>${esc(e.tg)}</span> · `:""}${e.ty}</span></div>`).join("")+`</div>`).join("")],
];

const cards=document.getElementById("cards");
V.forEach((v,i)=>{const id=String(i+1).padStart(2,"0");const c=document.createElement("div");c.className="card";
  c.innerHTML=`<div class="cap"><span class="n">${id}</span><span class="t">${v[0]}</span><span class="d">${v[1]}</span></div><div class="body">${v[2]()}</div>`;cards.appendChild(c);});
const root=document.documentElement;
document.getElementById("tgl").onclick=()=>{const cur=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");root.setAttribute("data-theme",cur==="dark"?"light":"dark");};
</script>
</body>
</html>
