name: Dump schema -> Pages

on:
  schedule:
    - cron: '*/30 * * * *'   # poll CS2 build every 30 min
  workflow_dispatch:
    inputs:
      force:
        description: rebuild even if the game build is unchanged
        type: boolean
        default: false

permissions:
  contents: write   # create tags / releases
  pages: write
  id-token: write

concurrency:
  group: schema
  cancel-in-progress: false

jobs:
  # Poll every game's manifest GIDs; rebuild all when the combined key differs from the last tag.
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      changed: ${{ steps.v.outputs.changed }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve versions
        id: v
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y unzip
          key=""
          for g in cs2 dota2 deadlock; do
            gid=$(GAME=$g bash scripts/game-version.sh || echo NA)
            echo "$g: $gid"
            key="$key$g=$gid;"
          done
          ver=$(printf '%s' "$key" | sha1sum | cut -c1-12)
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "changed=1" >> "$GITHUB_OUTPUT"; echo "forced rebuild ($ver)"
          elif git ls-remote --exit-code --tags origin "refs/tags/s2-$ver" >/dev/null 2>&1; then
            echo "changed=0" >> "$GITHUB_OUTPUT"; echo "up to date ($ver)"
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"; echo "new version $ver"
          fi

  dump:
    needs: check
    if: needs.check.outputs.changed == '1'
    strategy:
      fail-fast: false
      matrix:
        game: [cs2, dota2, deadlock]
        platform:
          - { os: windows-latest, target: windows, name: win64 }
          - { os: ubuntu-latest,  target: linux,   name: linux }
        exclude:
          # Deadlock ships no usable Linux binaries yet
          - game: deadlock
            platform: { os: ubuntu-latest, target: linux, name: linux }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Runtime deps (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          # g++-14: the dumper uses C++23 <print>, which libstdc++ only ships from GCC 14.
          sudo apt-get install -y ninja-build g++-14 libva2 libvdpau1 libx11-6 libdrm2

      - name: Fetch SDKs (game branch)
        shell: bash
        run: |
          case "${{ matrix.game }}" in
            cs2) BR=main ;; dota2) BR=dota ;; deadlock) BR=deadlock ;;
          esac
          git clone --recursive --depth 1 --branch "$BR" https://github.com/Wend4r/sourcesdk thirdparty/sourcesdk
          git clone --recursive --depth 1 https://github.com/Wend4r/cpp-dynlibutils thirdparty/cpp-dynlibutils
          git clone --depth 1 --branch v7.9.0 https://github.com/stephenberry/glaze thirdparty/glaze

      - name: Download depot
        shell: bash
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: GAME=${{ matrix.game }} bash scripts/download-depots.sh ${{ matrix.platform.target }}

      - name: Setup MSVC (Windows)
        if: matrix.platform.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.os }}" = "ubuntu-latest" ]; then
            CC=gcc-14 CXX=g++-14 cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGAME=${{ matrix.game }}
          else
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGAME=${{ matrix.game }} \
              -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
          fi
          cmake --build build -j

      - name: Dump schema
        shell: bash
        run: |
          case "${{ matrix.game }}" in
            cs2) GD=csgo ;; dota2) GD=dota ;; deadlock) GD=citadel ;;
          esac
          if [ "${{ matrix.platform.os }}" = "ubuntu-latest" ]; then
            G="${{ matrix.game }}"
            export LD_LIBRARY_PATH="$PWD/game/$G/game/bin/linuxsteamrt64:$PWD/game/$G/game/$GD/bin/linuxsteamrt64"
            ./build/source2_dumper out
          else
            ./build/source2_dumper.exe out
          fi

      - name: Upload site part
        uses: actions/upload-artifact@v4
        with:
          name: schema-${{ matrix.game }}-${{ matrix.platform.name }}
          path: out
          retention-days: 1

  # Commit the per-class header dump to a per-game branch (schema-dump-<game>) so
  # each game's schema changes are diffable on GitHub in isolation.
  commit-headers:
    needs: [check, dump]
    if: needs.check.outputs.changed == '1'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game: [cs2, dota2, deadlock]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Download OUTSIDE the repo tree, else the untracked parts/ collides with `git checkout`.
      - name: Collect ${{ matrix.game }} parts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/parts
          pattern: schema-${{ matrix.game }}-*
          merge-multiple: true

      - name: Commit headers to schema-dump-${{ matrix.game }}
        run: |
          set -e
          g="${{ matrix.game }}"
          br="schema-dump-$g"
          git config user.name  "schema-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "$br" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$br"
            git checkout "$br"
          else
            git checkout --orphan "$br"
            git rm -rfq . || true
          fi
          rm -rf headers parts        # parts/ drops any stray copy committed by older runs
          mkdir -p headers
          # Flatten the game level: on a per-game branch it is redundant -> headers/<platform>/...
          cp -r "$RUNNER_TEMP/parts/headers/$g/"* headers/ 2>/dev/null || true
          manifest="${{ needs.check.outputs.version }}"
          pv=$(cat "$RUNNER_TEMP/parts/$g/patchversion.txt" 2>/dev/null || echo "?")
          printf 'Source2 schema dump — %s\n\nPatchVersion: %s\nManifest: %s\nOne .h per class, grouped by platform/module (+ convars.txt / concommands.txt). Diff commits to see schema changes.\n' \
            "$g" "$pv" "$manifest" > README.md
          git add -A
          git commit -m "schema dump $g $pv (manifest $manifest)" || { echo "no schema changes for $g"; exit 0; }
          git push origin "$br"

  publish:
    needs: [check, dump]
    if: needs.check.outputs.changed == '1'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5   # frontend source (web/)

      - name: Collect dump parts (per-platform JSON)
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/parts
          pattern: schema-*
          merge-multiple: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Stage JSON data into the frontend
        run: |
          mkdir -p web/public/data
          for g in cs2 dota2 deadlock; do
            for p in win64 linux; do
              if [ -d "$RUNNER_TEMP/parts/$g/$p" ]; then
                mkdir -p "web/public/data/$g/$p"
                cp "$RUNNER_TEMP/parts/$g/$p"/*.json "web/public/data/$g/$p/"
                echo "staged $g/$p: $(ls "web/public/data/$g/$p" | wc -l) json"
              fi
            done
          done

      - name: Build static site (Vite)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # Lightweight tag only (no release) — marks this manifest as done so `check` skips it next run.
      - name: Tag the build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/s2-${{ needs.check.outputs.version }}" \
            -f sha="${{ github.sha }}" || echo "tag already exists"
